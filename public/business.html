<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Business</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(12, 25, 43, 0.86);
      --panel-border: rgba(133, 226, 222, 0.28);
      --text: #f5fbff;
      --muted: #a9bac9;
      --cyan: #7ee7e2;
      --gold: #f4c76b;
      --coral: #ff8f70;
      --shadow: 0 24px 90px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(126, 231, 226, 0.22), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(244, 199, 107, 0.18), transparent 28%),
        linear-gradient(145deg, #07111f 0%, #101929 48%, #0d1422 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    main {
      width: min(880px, 100%);
      padding: clamp(28px, 5vw, 54px);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid rgba(126, 231, 226, 0.34);
      border-radius: 999px;
      color: var(--cyan);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
      background: rgba(126, 231, 226, 0.08);
    }

    h1 {
      margin: 22px 0 10px;
      font-size: clamp(36px, 7vw, 76px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 640px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.75;
      letter-spacing: 0;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 36px;
    }

    .product-card {
      position: relative;
      display: flex;
      min-height: 156px;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.07);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .product-card:hover {
      transform: translateY(-2px);
      border-color: rgba(126, 231, 226, 0.64);
      background: rgba(126, 231, 226, 0.12);
    }

    .product-copy {
      width: 100%;
    }

    .product-copy strong {
      display: block;
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .enter-button {
      display: inline-flex;
      align-self: center;
      min-width: 104px;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: #06111d;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0;
      text-decoration: none;
      background: var(--cyan);
      box-shadow: 0 10px 28px rgba(126, 231, 226, 0.22);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .enter-button:hover,
    .enter-button:focus-visible {
      transform: translateY(-1px);
      background: #a1f5f0;
      box-shadow: 0 14px 34px rgba(126, 231, 226, 0.3);
      outline: none;
    }

    .daily .enter-button {
      background: var(--gold);
      box-shadow: 0 10px 28px rgba(244, 199, 107, 0.2);
    }

    .daily .enter-button:hover,
    .daily .enter-button:focus-visible {
      background: #ffd987;
      box-shadow: 0 14px 34px rgba(244, 199, 107, 0.28);
    }

    .monthly {
      color: var(--cyan);
    }

    .daily {
      color: var(--gold);
    }

    @media (max-width: 680px) {
      body {
        align-items: stretch;
        padding: 16px;
      }

      main {
        display: flex;
        min-height: calc(100vh - 32px);
        flex-direction: column;
        justify-content: center;
        padding: 28px 20px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .product-card {
        min-height: 148px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">GPT Business</div>
    <h1>选择项目</h1>
    <p class="subtitle">请选择要购买的 GPT Business 项目，系统会跳转到对应页面继续完成下单。</p>
    <div class="actions" aria-label="GPT Business 项目入口">
      <article class="product-card monthly">
        <div class="product-copy">
          <strong>GPT Business 月卡</strong>
        </div>
        <a class="enter-button" id="monthly-link" href="https://www.penqda.com/" rel="noopener">进入</a>
      </article>
      <article class="product-card daily">
        <div class="product-copy">
          <strong>GPT Business 日卡</strong>
        </div>
        <a class="enter-button" id="daily-link" href="https://xn--2team-cd2h.com" rel="noopener">进入</a>
      </article>
    </div>
  </main>

  <script>
    const monthlyLink = document.getElementById('monthly-link');
    const dailyLink = document.getElementById('daily-link');

    fetch('/api/public/business-links', { cache: 'no-store' })
      .then((response) => response.ok ? response.json() : null)
      .then((links) => {
        if (!links) return;
        if (typeof links.monthly === 'string' && links.monthly) monthlyLink.href = links.monthly;
        if (typeof links.daily === 'string' && links.daily) dailyLink.href = links.daily;
      })
      .catch(() => {});
  </script>
</body>
</html>
